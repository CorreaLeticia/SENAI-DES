<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja - Produtos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Minha Lojinha</h1>
    <button onclick="abrirCarrinho()">🛒 Carrinho</button>
  </header>

  <main>
    <div class="produtos" id="listaProdutos"></div>
  </main>

  <div id="modalCarrinho" class="modal">
    <div class="modal-content">
      <h2>Carrinho de Compras</h2>

      <table>
        <thead>
          <tr>
            <th>Produto</th>
            <th>Quantidade</th>
            <th>Preço</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="dadosCarrinho"></tbody>
      </table>

      <h3 id="total">Total: R$ 0,00</h3>

      <div class="modal-buttons">
        <button onclick="fecharCarrinho()">Fechar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
