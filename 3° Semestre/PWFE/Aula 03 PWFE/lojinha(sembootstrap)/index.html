<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lojinha</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">TechStore</div>
        <ul class="links">
            <li>Home</li>
            <li>Produtos</li>
        </ul>
    </nav>

    <header class="ofertas">
        <h1>As melhores ofertas!</h1>
    </header>

    <main>
        <div class="container">
            <div class="grid-produtos">

                <div class="card">
                    <img src="https://imgs.casasbahia.com.br/55065350/1g.jpg?imwidth=500" alt="Smartphone Samsung S24">
                    <h3>Smartphone Samsung S24</h3>
                    <p>R$ 3.000,00</p>
                    <button class="btn-comprar">Comprar</button>
                </div>

                <div class="card">
                    <img src="https://m.media-amazon.com/images/I/51m661VQOKL.jpg" alt="Galaxy tab S10 FE">
                    <h3>Galaxy Tab S10 FE</h3>
                    <p>R$ 3.900,00</p>
                    <button class="btn-comprar">Comprar</button>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
</html>
