<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loja - Clientes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Loja - Cadastro do Cliente</h1>
    <button onclick="abrirModal()">Novo Cliente</button>
  </header>
  <main>
    <table>
      <thead>
        <tr>
          <th>CPF</th>
          <th>Nome</th>
          <th>Sobrenome</th>
          <th>Nascimento</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="dados"></tbody>
    </table>
  </main>
  <!--Criar Modal-->
  <div id="modalCli" class="modal">
    <form id="formCli" class="modal-content">
      <h2>Novo Cliente</h2>
      <input type="text" id="cpf" placeholder="CPF" required>
      <input type="text" id="nome" placeholder="Nome" required>
      <input type="text" id="sobrenome" placeholder="Sobrenome"required>
      <input type="date" id="nascimento"required>
      <div class="modal-buttons">
        <button type="submit">Salvar</button>
        <button type="reset" onclick="fecharModal()">Cancelar</button>
      </div>
    </form>
  </div>
  <script src="script.js"></script>
</body>
</html>
